<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Create Account — Amazon.in</title>
<link rel="icon" href="https://www.amazon.in/favicon.ico">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body style="background:#EAEDED">
<div id="toast-container"></div>

<header style="background:var(--amazon-dark);padding:10px 0;text-align:center;border-bottom:1px solid #3a4553">
  <a href="index.html" style="display:inline-block">
    <svg width="95" height="29" viewBox="0 0 95 29" fill="none">
      <text x="0" y="22" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="white">amazon</text>
      <path d="M5 26 Q47 32 90 26" stroke="#FF9900" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
  </a>
</header>

<div style="max-width:400px;margin:24px auto;padding:0 16px">
  <div class="card" style="border:1px solid #ddd;border-radius:4px;padding:24px">
    <h1 style="font-size:28px;font-weight:400;margin-bottom:20px">Create account</h1>
    <div id="alertBox"></div>
    <div class="form-group">
      <label class="form-label">Your name</label>
      <input type="text" id="nameInput" class="form-input" placeholder="First and last name">
    </div>
    <div class="form-group">
      <label class="form-label">Mobile number or email</label>
      <input type="email" id="emailInput" class="form-input" placeholder="Enter email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="passInput" class="form-input" placeholder="At least 6 characters">
      <div class="form-error" id="passHint" style="display:none">Password must be at least 6 characters.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Re-enter password</label>
      <input type="password" id="confirmInput" class="form-input" placeholder="Confirm password"
        onkeydown="if(event.key==='Enter')doRegister()">
      <div class="form-error" id="confirmHint" style="display:none">Passwords do not match.</div>
    </div>
    <button class="btn btn-primary btn-full" style="font-size:14px;font-weight:700;padding:10px;margin-bottom:14px" id="regBtn" onclick="doRegister()">Create your Amazon account</button>
    <p style="font-size:12px;color:#555;line-height:1.5">By creating an account, you agree to Amazon's <a href="#" style="color:var(--amazon-link)">Conditions of Use</a> and <a href="#" style="color:var(--amazon-link)">Privacy Notice</a>.</p>
  </div>
  <div style="text-align:center;margin-top:14px;font-size:13px">
    Already have an account? <a href="login.html" style="color:var(--amazon-link)">Sign in</a>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
function showToast(msg,type='success'){const c=document.getElementById('toast-container');const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);requestAnimationFrame(()=>{setTimeout(()=>t.classList.add('visible'),10)});setTimeout(()=>{t.classList.remove('visible');setTimeout(()=>t.remove(),400)},2800);}
async function doRegister(){
  const name  = document.getElementById('nameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;
  const conf  = document.getElementById('confirmInput').value;
  const btn   = document.getElementById('regBtn');
  const alert = document.getElementById('alertBox');
  alert.innerHTML='';
  document.getElementById('passHint').style.display='none';
  document.getElementById('confirmHint').style.display='none';

  if (!name||!email||!pass||!conf){alert.innerHTML='<div class="alert alert-error">Please fill in all fields.</div>';return;}
  if (pass.length<6){document.getElementById('passHint').style.display='block';return;}
  if (pass!==conf){document.getElementById('confirmHint').style.display='block';return;}

  btn.disabled=true;btn.textContent='Creating account...';
  try{
    await window.Auth.doRegister(name,email,pass);
    showToast('Account created! Welcome to Amazon! 🎉','success');
    setTimeout(()=>window.location.href='index.html',1000);
  }catch(e){
    alert.innerHTML=`<div class="alert alert-error">⚠️ ${e.message}</div>`;
    btn.disabled=false;btn.textContent='Create your Amazon account';
  }
}
</script>
</body>
</html>
