<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shopping Cart — Amazon.in</title>
<link rel="icon" href="https://www.amazon.in/favicon.ico">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<style>
body{background:#EAEDED;font-family:'Segoe UI',Arial,sans-serif}
.cart-wrap{max-width:1100px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:flex-start}
.cart-card{background:#fff;border:1px solid #ddd;border-radius:4px;padding:20px}
.item-row{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid #f0f0f0}
.item-row:last-child{border-bottom:none}
.item-img{width:130px;height:130px;object-fit:contain;border:1px solid #eee;border-radius:3px;flex-shrink:0;cursor:pointer}
.item-title{font-size:16px;color:#0F1111;line-height:1.4;margin-bottom:6px}
.item-stock{font-size:13px;color:#007600;margin-bottom:4px}
.qty-box{background:#f3f3f3;border:1px solid #ccc;border-radius:4px;display:inline-flex;align-items:center}
.qty-btn{background:none;border:none;padding:6px 14px;font-size:18px;font-weight:700;cursor:pointer;color:#0F1111;transition:background .15s}
.qty-btn:hover{background:#e8e8e8}
.qty-num{padding:6px 14px;font-weight:700;min-width:20px;text-align:center;font-size:15px}
.act-btn{background:none;border:none;color:#007185;font-size:13px;cursor:pointer;padding:0;text-decoration:underline}
.act-btn:hover{color:#c7511f}
.summary-card{background:#fff;border:1px solid #ddd;border-radius:4px;padding:20px;position:sticky;top:20px}
.proceed-btn{background:#FFD814;border:1px solid #FCD200;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:.15s;margin-top:12px}
.proceed-btn:hover{background:#F0C400}
@media(max-width:700px){.cart-wrap{grid-template-columns:1fr}.item-img{width:90px;height:90px}}
</style>
</head>
<body>
<div id="toast-container"></div>



<header style="background:#131921;padding:10px 16px;display:flex;align-items:center;gap:12px">
  <a href="index.html">
    <svg width="90" height="28" viewBox="0 0 90 28"><text x="0" y="21" font-family="Arial Black,sans-serif" font-size="20" font-weight="900" fill="white">amazon</text><path d="M5 24 Q45 30 86 24" stroke="#FF9900" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
  </a>
  <span style="color:#fff;font-size:20px;font-weight:700;flex:1;text-align:center">Shopping Cart</span>
  <a href="cart.html" style="color:#fff;text-decoration:none;font-size:14px">🛒 Cart</a>
</header>

<div class="cart-wrap" id="cartWrap">
  <!-- Items -->
  <div>
    <div class="cart-card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <h1 style="font-size:24px;font-weight:400;margin:0">Shopping Cart</h1>
        <span style="font-size:13px;color:#565959">Price</span>
      </div>
      <hr style="border:none;border-top:1px solid #ddd;margin:10px 0">
      <div id="cartItemsContainer"></div>
    </div>
    <div style="text-align:right;padding:10px 0;font-size:18px">
      Subtotal (<span id="totalCount">0</span> items): <strong id="subtotalDisplay">₹0</strong>
    </div>
  </div>

  <!-- Summary -->
  <div>
    <div class="summary-card">
      <div style="color:#007600;font-size:13px;margin-bottom:10px">✔ Your order is eligible for FREE Delivery.</div>
      <div style="font-size:18px;margin-bottom:4px">
        Subtotal (<span id="totalCount2">0</span> items):<br>
        <strong style="font-size:22px" id="subtotalDisplay2">₹0</strong>
      </div>
      <button class="proceed-btn" onclick="window.location.href='checkout.html'">Proceed to checkout</button>
      <div style="font-size:12px;color:#555;margin-top:8px;text-align:center">
        or <a href="index.html" style="color:#007185">continue shopping</a>
      </div>
    </div>
  </div>
</div>

<!-- Empty State -->
<div id="emptyState" style="display:none;max-width:600px;margin:60px auto;text-align:center;padding:40px">
  <div style="font-size:72px;margin-bottom:16px">🛒</div>
  <h2 style="font-size:22px;font-weight:400;margin-bottom:8px">Your Amazon Cart is empty</h2>
  <p style="color:#555;margin-bottom:24px">You have no items in your shopping cart.</p>
  <a href="index.html" style="background:#FFD814;border:1px solid #FCD200;border-radius:6px;padding:12px 28px;font-size:15px;font-weight:700;text-decoration:none;color:#000">Shop today's deals</a>
</div>

<script src="js/static-data.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
function fmt(n){return '₹'+Number(n).toLocaleString('en-IN');}
function showToast(msg,type='success'){let c=document.getElementById('toast-container');if(!c)return;const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);requestAnimationFrame(()=>setTimeout(()=>t.classList.add('visible'),10));setTimeout(()=>{t.classList.remove('visible');setTimeout(()=>t.remove(),400)},2800);}

function loadCart(){
  return JSON.parse(localStorage.getItem('amazon_local_cart')||'[]');
}
function saveCart(cart){
  localStorage.setItem('amazon_local_cart',JSON.stringify(cart));
}

function render(){
  const cart=loadCart();
  const wrap=document.getElementById('cartWrap');
  const empty=document.getElementById('emptyState');

  if(!cart.length){
    wrap.style.display='none';
    empty.style.display='block';
    return;
  }
  wrap.style.display='grid';
  empty.style.display='none';

  const total=cart.reduce((a,i)=>a+(i.price||0)*(i.qty||1),0);
  const count=cart.reduce((a,i)=>a+(i.qty||1),0);
  ['totalCount','totalCount2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=count;});
  ['subtotalDisplay','subtotalDisplay2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=fmt(total);});

  document.getElementById('cartItemsContainer').innerHTML=cart.map((item,idx)=>`
    <div class="item-row">
      <img class="item-img" src="${item.image||'https://via.placeholder.com/130'}" alt="${item.name||''}" onclick="window.location.href='index.html'" onerror="this.src='https://via.placeholder.com/130'">
      <div style="flex:1">
        <div class="item-title">${item.name||'Product'}</div>
        <div class="item-stock">In Stock</div>
        <div style="color:#007185;font-size:12px;margin-bottom:8px">⚡ <strong>prime</strong> FREE Delivery</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div class="qty-box">
            <button class="qty-btn" onclick="changeQty(${idx},${(item.qty||1)-1})">−</button>
            <span class="qty-num">${item.qty||1}</span>
            <button class="qty-btn" onclick="changeQty(${idx},${(item.qty||1)+1})">+</button>
          </div>
          <span style="color:#ccc">|</span>
          <button class="act-btn" onclick="removeItem(${idx})">Delete</button>
          <span style="color:#ccc">|</span>
          <button class="act-btn" onclick="saveForLater(${idx})">Save for later</button>
        </div>
      </div>
      <div style="font-size:18px;font-weight:700;white-space:nowrap;color:#0F1111">${fmt((item.price||0)*(item.qty||1))}</div>
    </div>`).join('');
}

function changeQty(idx,newQty){
  const cart=loadCart();
  if(!cart[idx])return;
  if(newQty<1){removeItem(idx);return;}
  cart[idx].qty=Math.min(newQty,10);
  saveCart(cart);render();
}
function removeItem(idx){
  const cart=loadCart();
  cart.splice(idx,1);
  saveCart(cart);render();
  showToast('Item removed from cart','info');
}
function saveForLater(idx){
  const cart=loadCart();
  const item=cart[idx];
  if(item){
    const wl=JSON.parse(localStorage.getItem('amazon_wishlist')||'[]');
    if(!wl.includes(item.productId))wl.push(item.productId);
    localStorage.setItem('amazon_wishlist',JSON.stringify(wl));
  }
  removeItem(idx);
  showToast('Saved for later ❤️','success');
}

document.addEventListener('DOMContentLoaded',()=>render());
</script>
</body>
</html>
