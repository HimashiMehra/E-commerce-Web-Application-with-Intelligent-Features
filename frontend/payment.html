<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Settings — Amazon.in</title>
<link rel="icon" href="https://www.amazon.in/favicon.ico">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body style="background:#f5f5f5">
<header style="background:var(--amazon-dark)">
  <div class="header-main">
    <a href="index.html" class="logo"><svg width="95" height="29" viewBox="0 0 95 29" fill="none"><text x="0" y="22" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="white">amazon</text><path d="M5 26 Q47 32 90 26" stroke="#FF9900" stroke-width="3" fill="none" stroke-linecap="round"/></svg><span class="logo-country">.in</span></a>
    <div style="flex:1;text-align:center;color:#fff;font-size:20px;font-weight:700">Payment Settings</div>
  </div>
</header>
<main style="max-width:600px; margin:40px auto; padding:0 20px;">
  <div class="card" style="padding: 24px;">
    <h2>Your Saved Payment Methods</h2>
    <div style="border:1px solid #ddd; border-radius:4px; padding:16px; margin:16px 0; display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-weight:700; font-size:16px;">💳 Visa ending in 1234</div>
        <div style="font-size:13px; color:#555;">Expires 12/2028</div>
      </div>
      <button class="btn btn-outline" onclick="showToast('Payment method removed!', 'info')">Remove</button>
    </div>
    <div style="border:1px solid #ddd; border-radius:4px; padding:16px; margin:16px 0; display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-weight:700; font-size:16px;">📱 Amazon Pay UPI</div>
        <div style="font-size:13px; color:#555;">user@upi</div>
      </div>
      <button class="btn btn-outline" onclick="showToast('Payment method removed!', 'info')">Remove</button>
    </div>
    
    <hr style="border:none; border-top:1px solid #eee; margin:24px 0;">
    
    <h3>Add a New Method</h3>
    <form onsubmit="event.preventDefault(); showToast('Card added successfully!');" style="margin-top:16px;">
      <div class="form-group">
        <label class="form-label">Card Number</label>
        <input type="text" class="form-input" placeholder="XXXX XXXX XXXX XXXX" required>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div class="form-group">
          <label class="form-label">Expiry Date</label>
          <input type="text" class="form-input" placeholder="MM/YY" required>
        </div>
        <div class="form-group">
          <label class="form-label">CVV</label>
          <input type="password" class="form-input" placeholder="123" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Add Card</button>
    </form>
  </div>
</main>
<div id="toast-container"></div>
<script>
function showToast(msg,type='success'){const c=document.getElementById('toast-container');const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);requestAnimationFrame(()=>{setTimeout(()=>t.classList.add('visible'),10)});setTimeout(()=>{t.classList.remove('visible');setTimeout(()=>t.remove(),400)},2800);}
</script>
</body>
</html>
